services:

  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    command: >
      tritonserver
      --model-repository=/models
    volumes:
      - ./model_repository:/models
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"

  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.fastapi
    ports:
      - "9000:8001"
    depends_on:
      - triton